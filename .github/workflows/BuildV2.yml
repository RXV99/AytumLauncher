name: Build VPK V2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          VITASDK=${VITASDK:-/usr/local/vitasdk}
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release 2>&1

      - name: Build ELF
        run: cmake --build build -j$(nproc) --verbose 2>&1

      - name: Generate placeholder icons
        run: |
          if [ ! -f sce_sys/icon0.png ]; then
            python3 -c "
import struct, zlib
def make_png(w, h, r, g, b):
    def chunk(t, d):
        c = t + d
        return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
    raw = b''
    for y in range(h):
        raw += b'\x00' + bytes([r,g,b]) * w
    return (b'\x89PNG\r\n\x1a\n' +
            chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) +
            chunk(b'IDAT', zlib.compress(raw)) +
            chunk(b'IEND', b''))
import os
os.makedirs('sce_sys/livearea/contents', exist_ok=True)
with open('sce_sys/icon0.png','wb') as f: f.write(make_png(128,128,64,80,160))
with open('sce_sys/livearea/contents/bg.png','wb') as f: f.write(make_png(840,500,50,50,80))
with open('sce_sys/livearea/contents/startup.png','wb') as f: f.write(make_png(280,158,64,80,160))
"
          fi

      - name: Create VPK
        run: |
          set -e
          cd build
          echo "=== Converting ELF ==="
          vita-elf-create vita-java-me.elf vita-java-me.velf 2>&1
          echo "=== Creating EBOOT ==="
          vita-make-fself vita-java-me.velf eboot.bin 2>&1
          echo "=== Copying sce_sys ==="
          rm -rf sce_sys
          cp -r ../sce_sys .
          echo "=== Creating binary SFO ==="
          vita-mksfoex -s JAVAME00001 "Java ME Emulator" sce_sys/param.sfo 2>&1
          echo "=== Creating VPK (zip) ==="
          cd ../build
          zip -r ../vita-java-me.vpk eboot.bin sce_sys/ 2>&1
          echo "=== VPK created ==="
          ls -la ../vita-java-me.vpk

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: vita-java-me.vpk
          path: vita-java-me.vpk

      - name: Upload debug ELF
        uses: actions/upload-artifact@v4
        with:
          name: vita-java-me.elf
          path: build/vita-java-me.elf
